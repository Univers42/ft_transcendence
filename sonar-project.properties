sonar.organization=univers42
sonar.projectKey=Univers42_ft_transcendence
sonar.projectName=ft_transcendence

sonar.host.url=https://sonarcloud.io

sonar.sources=.
sonar.tests=

# Analyse the source languages we actually own.
sonar.inclusions=**/*.js,**/*.ts,**/*.mjs,**/*.astro,**/*.css,**/*.html,**/*.sql,**/*.yml,**/*.yaml,**/*.md

# Exclusions = things that are NOT hand-maintained product code, so they must
# not be gated by code-quality rules:
#   wiki/**            Docusaurus-GENERATED static site (build output)
#   **/sandbox/**      throwaway dev sandboxes / demos
#   apps/prismatica/** un-built design prototype (no package.json, not deployed;
#                      superseded by apps/opposite-osiris)
#   build artifacts    dist / build / .astro / sourcemaps / minified bundles
#   tooling/vendor     node_modules, vendor, .git, .vscode, coverage
# NOTE: models/** (SQL migrations) and apps/** product code stay IN scope.
sonar.exclusions=**/node_modules/**,**/.git/**,**/.vscode/**,**/coverage/**,vendor/**,wiki/**,**/sandbox/**,apps/prismatica/**,**/dist/**,**/build/**,**/.astro/**,**/*.map,**/*.min.js,**/*.min.css

sonar.coverage.exclusions=**/*

sonar.sourceEncoding=UTF-8
