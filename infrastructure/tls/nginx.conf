events {}

http {
  resolver 127.0.0.11 ipv6=off valid=10s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache shared:track_binocle_tls:10m;
  ssl_session_timeout 10m;
  error_page 497 =308 https://$host:$server_port$request_uri;

  proxy_http_version 1.1;
  proxy_set_header Host $http_host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto https;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 1h;
  proxy_send_timeout 1h;

  server {
    listen 4322 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream opposite-osiris-web:8080;
    # Security hardening headers for the website. The CSP itself is emitted by
    # the app (Astro security.csp meta, incl. frame-ancestors 'none'); these are
    # the transport/clickjacking/sniffing defenses the proxy must add because the
    # website does not pass through Kong (which only fronts /api). `always` makes
    # nginx emit them even on proxied/error responses.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    # frame-ancestors only takes effect as an HTTP header (it is ignored in the
    # app's <meta> CSP). Header-only policy with a single directive does not
    # restrict scripts/styles — the app's strict <meta> CSP still governs those.
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), midi=(), payment=(), picture-in-picture=(), publickey-credentials-get=(), screen-wake-lock=(), sync-xhr=(self), usb=(), web-share=(), xr-spatial-tracking=()" always;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 3001 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream osionos-app:80;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 4000 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream osionos-bridge:4000;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 8787 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream auth-gateway:8787;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 8000 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream kong:8000;
    location = / {
      default_type application/json;
      add_header Cache-Control no-store;
      return 200 '{"ok":true,"service":"track-binocle-baas","routes":["/auth/v1","/rest/v1","/meta/v1"],"docs":"README.md"}\n';
    }
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 8001 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream kong:8001;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 3002 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream mail:3002;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 4100 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream mail-bridge:4100;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 3003 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream calendar:3003;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 4200 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream calendar-bridge:4200;
    location / { proxy_pass http://$track_binocle_upstream; }
  }

  server {
    listen 8200 ssl;
    server_name localhost 127.0.0.1;
    ssl_certificate /etc/track-binocle/certs/localhost.pem;
    ssl_certificate_key /etc/track-binocle/certs/localhost-key.pem;
    set $track_binocle_upstream vault:8200;
    location / { proxy_pass http://$track_binocle_upstream; }
  }
}
