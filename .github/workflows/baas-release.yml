# ─────────────────────────────────────────────────────────────────────────────
# BaaS Release — triggered on baas-v* tags (e.g. git tag baas-v1.0.0).
#
# Monorepo home (decided 2026-06-12): the standalone Univers42/mini-baas-infra
# repo is a month stale, so the release fires from ft_transcendence with
# working-directory apps/baas/mini-baas-infra. The same pipeline shape as the
# proven realtime-agnostic release.yml: gates → bake push → binocle images →
# binary extraction → GitHub Release → post-publish probe.
#
# Tag namespace: baas-v[SEMVER] (bare v* belongs to other suite products).
# Publishes (DOCKER HUB ONLY for user-facing artifacts — public by default on
# push, no GHCR visibility dance; decision 2026-06-13):
#   • 16 bake images        → docker.io/dlesieur/mini-baas-<svc>:VERSION + latest
#   • binocle-nano / -one   → docker.io/dlesieur/binocle-{nano,one}
#   • binary tarballs+sha256 + install.sh → GitHub Release on this repo
#   • buildx layer cache    → ghcr.io/univers42/mini-baas/cache:* (internal,
#     CI-only — end users never pull it, visibility irrelevant)
# v1.0 scope: linux/amd64 only (binocle Dockerfiles are x86_64-musl; arm64
# bake matrix deferred to v1.1 — see apps/baas/mini-baas-infra/RELEASE.md).
# ─────────────────────────────────────────────────────────────────────────────
name: BaaS Release

on:
  push:
    tags:
      - "baas-v[0-9]+.[0-9]+.[0-9]+"
      - "baas-v[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+"

env:
  HUB_NS: docker.io/dlesieur
  INFRA: apps/baas/mini-baas-infra

defaults:
  run:
    working-directory: apps/baas/mini-baas-infra

jobs:
  # ── Version from tag ────────────────────────────────────────────────────────
  version:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      prerelease: ${{ steps.v.outputs.prerelease }}
    steps:
      - id: v
        working-directory: .
        run: |
          VERSION="${GITHUB_REF_NAME#baas-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          case "$VERSION" in
            *-rc.*) echo "prerelease=true"  >> "$GITHUB_OUTPUT" ;;
            *)      echo "prerelease=false" >> "$GITHUB_OUTPUT" ;;
          esac

  # ── Gates: the binocle editions must pass their milestone gates ────────────
  gates:
    name: Gates (m37 nano · m40 one)
    runs-on: ubuntu-latest
    needs: version
    steps:
      - uses: actions/checkout@v4
      - name: Build binocle images
        run: |
          DOCKER_BUILDKIT=1 docker build -f docker/services/data-plane-router/Dockerfile.nano \
            -t binocle-nano docker/services/data-plane-router
          DOCKER_BUILDKIT=1 docker build -f docker/services/data-plane-router/Dockerfile.one \
            -t binocle-one docker/services/data-plane-router
      - name: Gate m37 (nano)
        run: bash scripts/verify/m37-nano.sh
      - name: Gate m40 (one)
        run: bash scripts/verify/m40-one.sh

  # ── Bake: build + push the 16 suite images ──────────────────────────────────
  bake-publish:
    name: Bake images → Docker Hub
    runs-on: ubuntu-latest
    needs: [version, gates]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Docker Hub — where the images go (public by default on push).
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      # GHCR — layer-cache push only (cache-to refs in docker-bake.hcl).
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Bake and push (VERSION tag)
        run: |
          docker buildx bake --push \
            --set "*.platform=linux/amd64" \
            -f docker-bake.hcl default
        env:
          TAG: ${{ needs.version.outputs.version }}
      - name: Bake and push (latest tag)
        if: needs.version.outputs.prerelease == 'false'
        run: |
          docker buildx bake --push \
            --set "*.platform=linux/amd64" \
            -f docker-bake.hcl default
        env:
          TAG: latest

  # ── Binocle images + binaries ───────────────────────────────────────────────
  binocle:
    name: Binocle images + binaries
    runs-on: ubuntu-latest
    needs: [version, gates]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: Build + push binocle images
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          for ed in nano one; do
            TAGS="-t ${HUB_NS}/binocle-${ed}:${VERSION}"
            if [ "${{ needs.version.outputs.prerelease }}" = "false" ]; then
              TAGS="$TAGS -t ${HUB_NS}/binocle-${ed}:latest"
            fi
            docker buildx build --push $TAGS \
              -f docker/services/data-plane-router/Dockerfile.${ed} \
              docker/services/data-plane-router
          done
      - name: Extract binaries (Docker-first — the scratch image IS the binary)
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p dist
          for ed in nano one; do
            docker buildx build --load -t binocle-${ed}:local \
              -f docker/services/data-plane-router/Dockerfile.${ed} \
              docker/services/data-plane-router
            cid="$(docker create binocle-${ed}:local)"
            docker cp "${cid}:/binocle-${ed}" "dist/binocle-${ed}"
            docker rm -f "${cid}" >/dev/null
            chmod +x "dist/binocle-${ed}"
            tar -czf "binocle-${ed}-${VERSION}-linux-amd64.tar.gz" -C dist "binocle-${ed}"
            sha256sum "binocle-${ed}-${VERSION}-linux-amd64.tar.gz" \
              > "binocle-${ed}-${VERSION}-linux-amd64.tar.gz.sha256"
          done
          sha256sum binocle-*-"${VERSION}"-linux-amd64.tar.gz > checksums.txt
      - uses: actions/upload-artifact@v4
        with:
          name: binocle-binaries
          path: |
            apps/baas/mini-baas-infra/binocle-*-linux-amd64.tar.gz
            apps/baas/mini-baas-infra/binocle-*-linux-amd64.tar.gz.sha256
            apps/baas/mini-baas-infra/checksums.txt
          retention-days: 90

  # ── GitHub Release with assets ──────────────────────────────────────────────
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [version, binocle, bake-publish]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: binocle-binaries
          path: release-assets/
      - name: Stage install.sh
        working-directory: .
        run: cp apps/baas/mini-baas-infra/scripts/install.sh release-assets/install.sh
      - uses: softprops/action-gh-release@v2
        with:
          name: "Grobase BaaS ${{ github.ref_name }}"
          prerelease: ${{ needs.version.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            release-assets/*

  # ── Monitoring — post-publish health probe ──────────────────────────────────
  monitor:
    name: Post-publish probe
    runs-on: ubuntu-latest
    needs: [version, binocle, github-release]
    steps:
      - name: Pull and probe published binocle-one
        working-directory: .
        # Deliberately anonymous: proves the image is publicly pullable, which
        # Docker Hub gives by default on push.
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          IMG="${HUB_NS}/binocle-one:${VERSION}"
          echo "Pulling ${IMG} ..."
          docker pull "${IMG}"
          docker run -d --name probe -p 8090:8090 "${IMG}"
          echo "Waiting for the image's own HEALTHCHECK ..."
          for i in $(seq 1 20); do
            status="$(docker inspect --format='{{.State.Health.Status}}' probe 2>/dev/null || echo starting)"
            if [ "$status" = "healthy" ]; then
              echo "✓ healthy"; docker rm -f probe; exit 0
            fi
            echo "  attempt $i/20 — $status"; sleep 3
          done
          echo "✗ probe failed"; docker logs probe; docker rm -f probe; exit 1
